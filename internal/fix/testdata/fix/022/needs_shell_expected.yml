name: test
on: [push]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build
        shell: bash
        run: go build ./...
      - name: already-shelled
        run: echo ok
        shell: bash
