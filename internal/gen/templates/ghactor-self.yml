# Generated by ghactor gen ghactor-self
# Runs ghactor lint against your own workflows and uploads SARIF to GitHub code scanning.
# security-events:write is scoped to the ghactor-lint job only.
name: ghactor

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Serialise runs per ref; cancel in-progress CI runs but not deploys.
concurrency:
  group: ghactor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ghactor-lint:
    name: ghactor self-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "[[.GoVersion]]"
          cache: true
      - name: Install ghactor
        run: go install github.com/kdairatchi/ghactor/cmd/ghactor@latest
      - name: Run ghactor lint
        run: |
          ghactor lint \
            --dir .github/workflows \
            --only-ghactor \
            --sarif ghactor.sarif \
            --fail-on error
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@1b549b9259bda1cb5ddde3b41741a82a2d15a841 # v3.28.13
        with:
          sarif_file: ghactor.sarif
          category: ghactor
