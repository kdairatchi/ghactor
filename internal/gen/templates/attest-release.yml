# Generated by ghactor gen attest-release
# Tag-triggered release with SLSA build provenance attestation via Sigstore.
# Attach signed attestations to every uploaded artifact — verifiable with
# `gh attestation verify` or `cosign verify-attestation`.
#
# Workflow level: contents:read (deny-all default).
# Release job escalates only what it needs:
#   - contents:write      — create GitHub release
#   - id-token:write      — Sigstore keyless signing via OIDC
#   - attestations:write  — attach attestation to release assets
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    name: Release + Attest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "[[.GoVersion]]"
          cache: true

      - name: Build artifacts
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/[[.BinaryName]] ./cmd/[[.BinaryName]]
          (cd dist && sha256sum [[.BinaryName]] > checksums.txt)

      - name: Attest build provenance
        uses: actions/attest-build-provenance@7668a9144a652b2ae1bfb92d9ca78b0dafd94c4a # v2.2.2
        with:
          subject-path: dist/[[.BinaryName]]

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/[[.BinaryName]] dist/checksums.txt
