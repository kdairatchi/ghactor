name: good
on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: safe
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: echo "$TITLE"
