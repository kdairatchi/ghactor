name: reusable-good
on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

  # SHA-pinned reusable call — must be clean
  deploy:
    needs: build
    uses: myorg/myrepo/.github/workflows/deploy.yml@aabbccdd11223344556677889900aabbccdd1122
    timeout-minutes: 15
