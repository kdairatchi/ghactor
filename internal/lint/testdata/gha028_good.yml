name: with-build-provenance-good
on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: build
        run: make build
      - uses: actions/attest-build-provenance@v1
      - uses: softprops/action-gh-release@v1
