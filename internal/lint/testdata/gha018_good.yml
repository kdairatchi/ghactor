name: gha018-good
on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: safe env export
        env:
          ISSUE_TITLE: "${{ github.event.issue.title }}"
        run: echo "processing issue $ISSUE_TITLE"
