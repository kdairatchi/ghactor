version: 2

project_name: ghactor

builds:
  - id: ghactor
    main: ./cmd/ghactor
    binary: ghactor
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# brews: / scoops: are commented out until the tap repositories exist.
# When ready, create:
#   gh repo create kdairatchi/homebrew-tap --public
#   gh repo create kdairatchi/scoop-bucket --public
# Then restore these stanzas in a follow-up release.

nfpms:
  - id: default
    package_name: ghactor
    homepage: https://github.com/kdairatchi/ghactor
    description: Security-first CLI for GitHub Actions workflows
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    maintainer: kdairatchi <96064915+kdairatchi@users.noreply.github.com>

dockers:
  - id: default
    image_templates:
      - ghcr.io/kdairatchi/ghactor:{{ .Version }}
      - ghcr.io/kdairatchi/ghactor:latest
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Security-first CLI for GitHub Actions workflows"
      - "--label=org.opencontainers.image.url=https://github.com/kdairatchi/ghactor"
      - "--label=org.opencontainers.image.source=https://github.com/kdairatchi/ghactor"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

sboms:
  - id: default
    artifacts: archive
    # Use GoReleaser's default syft invocation: `syft $artifact -o spdx-json=$document`.
    # Overriding cmd/args here with custom subcommands tripped up syft v1 CLI.

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --oidc-issuer=https://token.actions.githubusercontent.com
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    artifacts: checksum
    output: true

release:
  draft: false
  mode: replace
  footer: |
    ## Security

    ghactor is a security-first tool. Review the [CHANGELOG](CHANGELOG.md) and test thoroughly before updating in production.

    ## Installation

    ```sh
    go install github.com/kdairatchi/ghactor/cmd/ghactor@{{ .Tag }}
    ```

    Or download pre-built binaries below.
